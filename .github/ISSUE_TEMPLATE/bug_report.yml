name: Bug report
description: Something's broken
labels: [bug]
body:
  - type: input
    id: url
    attributes:
      label: URL you ran fontfetch against
      placeholder: https://example.com
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Paste the full CLI output if relevant.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: e.g. 20.11.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: fontfetch version
      placeholder: e.g. 0.1.0
    validations:
      required: true
