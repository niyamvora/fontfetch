name: release

# Manual-only. There's no tag-push trigger — the maintainer fires this from
# the Actions tab (or `gh workflow run release.yml`) once a version bump has
# landed on `main`. The workflow reads the version from
# `packages/cli/package.json`, publishes to npm, and creates a matching
# GitHub release + git tag. Use `dry_run: true` for a no-op trial that
# stops short of `npm publish`.
#
# Authentication: npm Trusted Publishing (OIDC). No long-lived token in the
# repo. GitHub Actions presents an OIDC identity to npm at publish time;
# npm validates it matches the Trusted Publisher configured for the
# `fontfetch` package (`niyamvora/fontfetch`, workflow `release.yml`,
# action `npm publish`) and issues a short-lived publish credential.
# Setup: https://docs.npmjs.com/trusted-publishers
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build + dry-publish, no npm publish, no tag, no release)"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # `id-token: write` is what makes Trusted Publishing work — it lets
      # the runner mint an OIDC token that npm verifies against the trusted
      # publisher config. `contents: write` is for the git-tag + GitHub
      # release step at the end.
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # Trusted publishing requires npm >= 11.5.1; the npm bundled with
      # Node 20 is older. Pin a known-good npm for the publish steps.
      - name: Pin npm@latest (>= 11.5.1 needed for Trusted Publishing)
        run: |
          npm install -g npm@latest
          echo "npm version: $(npm -v)"

      - name: Resolve CLI version
        id: ver
        run: |
          version=$(node -p "require('./packages/cli/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Will publish fontfetch@$version"

      - name: Abort if version already on npm
        if: ${{ inputs.dry_run == false }}
        run: |
          if npm view "fontfetch@${{ steps.ver.outputs.version }}" version > /dev/null 2>&1; then
            echo "::error::fontfetch@${{ steps.ver.outputs.version }} is already on npm. Bump the version in packages/cli/package.json (and packages/core/package.json) before re-running."
            exit 1
          fi
          echo "fontfetch@${{ steps.ver.outputs.version }} is not yet on npm — proceeding."

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck

      - run: pnpm run test

      - run: pnpm run build

      # Use `npm publish` (not `pnpm publish`) for the actual upload — npm's
      # OIDC + provenance support is the most mature. The rest of the
      # workflow stays on pnpm; only the publish call is delegated to npm.
      - name: Show what would publish (npm dry-run)
        working-directory: packages/cli
        run: npm publish --dry-run --provenance --access public

      - name: Publish to npm (Trusted Publishing)
        if: ${{ inputs.dry_run == false }}
        working-directory: packages/cli
        run: npm publish --provenance --access public

      - name: Create git tag + GitHub release
        if: ${{ inputs.dry_run == false }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
